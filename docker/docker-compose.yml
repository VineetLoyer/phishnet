# DSDL container for Foundation-Sec-8B inference.
#
# Splunk Enterprise runs natively on the host; this compose file only starts
# the model-serving container used when classifier=dsdl.
#
#   docker compose -f docker/docker-compose.yml up -d
#   docker compose -f docker/docker-compose.yml down

services:
  dsdl-foundation-sec:
    # Verify the image tag against splunk/splunk-mltk-container-docker before use.
    image: splunk/mltk-container-foundation-sec:latest
    container_name: phishnet-dsdl
    ports:
      - "5000:5000"   # inference endpoint (classifier=dsdl)
      - "8888:8888"   # Jupyter (optional testing)
    volumes:
      - dsdl-models:/srv/notebooks
    deploy:
      resources:
        limits:
          memory: 16G
    restart: unless-stopped

volumes:
  dsdl-models:
