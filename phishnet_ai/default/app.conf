#
# PhishNet AI - app.conf
# Autonomous phishing investigation agent for Splunk.
#

[install]
is_configured = false
state = enabled
build = 1

[package]
id = phishnet_ai
check_for_updates = false

[ui]
is_visible = true
label = PhishNet AI
docs_section_override = AI

[launcher]
author = Vineet Kumar Loyer
description = Autonomous phishing investigation agent. Investigates every phishing alert end-to-end using the Foundation-Sec-8B model and the Splunk MCP Server, fuses security and observability data into a Blast Radius view, and hands analysts a complete investigation report with transparent reasoning.
version = 0.1.0

[id]
name = phishnet_ai
version = 0.1.0
