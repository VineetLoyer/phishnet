#
# PhishNet AI - authorize.conf
# Role-based access control modeling the SOC org chart.
#
#   phishnet_analyst - works the queue: Command Center + Blast Radius.
#   phishnet_manager - everything the analyst sees, plus the Manager ROI tab.
#
# Both inherit the built-in 'user' role and are granted search access to the
# indexes PhishNet reads/writes so the dashboards resolve. The Manager ROI view
# itself is restricted to phishnet_manager (and admin) in metadata/default.meta;
# Splunk automatically hides nav entries a user has no read access to, so
# analysts never see the Manager tab.
#

[role_phishnet_analyst]
importRoles = user
srchIndexesAllowed = phishing;phishnet_actions;phishnet_audit
srchIndexesDefault = phishing

[role_phishnet_manager]
importRoles = phishnet_analyst
