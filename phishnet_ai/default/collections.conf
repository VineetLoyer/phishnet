#
# PhishNet AI - collections.conf
# KV Store collections used by the agent.
#

[phishnet_decisions]
# Per-alert classification result, reasoning, status, analyst override.
field.alert_id = string
field.verdict = string
field.confidence = number
field.reasoning = string
field.status = string
field.recommended_action = string
field.analyst_override = bool
field.created = time
field.updated = time

[phishnet_threat_intel]
# Cached threat-intel responses to avoid API rate limits during demos.
field.indicator = string
field.indicator_type = string
field.source = string
field.response = string
field.cached_at = time

[phishnet_metrics]
# Aggregated ROI metrics for the manager dashboard.
field.shift_id = string
field.alerts_processed = number
field.threats_caught = number
field.minutes_saved = number
field.updated = time
