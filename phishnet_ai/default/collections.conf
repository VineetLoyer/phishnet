#
# PhishNet AI - collections.conf
# KV Store collections used by the agent.
#

[phishnet_decisions]
# Per-alert classification result, reasoning, status, analyst override.
field.alert_id = string
field.verdict = string
field.confidence = number
field.reasoning = string
field.status = string
field.recommended_action = string
field.analyst_override = bool
field.payload_executed = bool
field.affected_host = string
field.recipient_count = number
field.sender = string
field.subject = string
field.users_clicked = number
field.creds_submitted = number
field.blast_timeline_json = string
field.blast_timeline_text = string
field.steps_text = string
field.endpoint_metrics_text = string
field.created = time
field.updated = time

[phishnet_audit_log]
# Analyst decisions + remediation events, mirrored from index=phishnet_audit so
# dashboards can read them reliably via | inputlookup (event searches render
# empty in Simple XML in this deployment).
field.ts = string
field.action = string
field.alert_id = string
field.analyst = string
field.detail = string

[phishnet_threat_intel]
# Cached threat-intel responses to avoid API rate limits during demos.
field.indicator = string
field.indicator_type = string
field.source = string
field.response = string
field.cached_at = time

[phishnet_metrics]
# Aggregated weekly ROI metrics for the manager dashboard.
field.week_start = string
field.alerts_processed = number
field.threats_caught = number
field.minutes_saved = number
field.accuracy_pct = number
field.escalation_rate = number
field.updated = time
