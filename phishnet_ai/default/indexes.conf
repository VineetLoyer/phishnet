#
# PhishNet AI - indexes.conf
# Defines the indexes PhishNet AI uses. Kept small for dev/demo.
#

[phishing]
homePath   = $SPLUNK_DB/phishing/db
coldPath   = $SPLUNK_DB/phishing/colddb
thawedPath = $SPLUNK_DB/phishing/thaweddb
maxTotalDataSizeMB = 2048

[phishnet_actions]
homePath   = $SPLUNK_DB/phishnet_actions/db
coldPath   = $SPLUNK_DB/phishnet_actions/colddb
thawedPath = $SPLUNK_DB/phishnet_actions/thaweddb
maxTotalDataSizeMB = 1024

[phishnet_audit]
homePath   = $SPLUNK_DB/phishnet_audit/db
coldPath   = $SPLUNK_DB/phishnet_audit/colddb
thawedPath = $SPLUNK_DB/phishnet_audit/thaweddb
maxTotalDataSizeMB = 512

# Note: the 'metrics' index for Blast Radius is created as a metrics-type
# index via Splunk Web or a separate indexes.conf stanza in Week 2.
