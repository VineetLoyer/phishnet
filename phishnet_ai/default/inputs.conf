#
# PhishNet AI - inputs.conf
# Registers the PhishNet agent as a Splunk modular input.
#
# The agent polls index=phishing for new alerts, runs the investigation
# playbook, classifies with Foundation-Sec-8B, and writes results to
# index=phishnet_actions and the phishnet_decisions KV Store collection.
#
# Demo cadence is 10s; production default is 60s.
#

[phishnet_agent://default]
interval = 10
disabled = 1
# index where the agent writes its own operational logs
index = phishnet_audit
sourcetype = phishnet:agent
# --- agent configuration (overridable per-input) ---
source_index = phishing
actions_index = phishnet_actions
metrics_index = metrics
# recommend | auto  (default: recommend = analyst confirms before close)
mode = recommend
# classification backend: dsdl | huggingface | mock
classifier = mock
