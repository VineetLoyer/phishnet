#
# PhishNet AI - transforms.conf
# Lookup definitions backing the KV Store collections, so dashboards can use
# `| inputlookup phishnet_decisions`.
#

[phishnet_decisions]
external_type = kvstore
collection = phishnet_decisions
fields_list = _key, alert_id, verdict, confidence, reasoning, status, recommended_action, analyst_override, payload_executed, affected_host, recipient_count, blast_timeline_json, created, updated

[phishnet_metrics]
external_type = kvstore
collection = phishnet_metrics
fields_list = _key, shift_id, alerts_processed, threats_caught, minutes_saved, updated
