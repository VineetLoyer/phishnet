#
# PhishNet AI - transforms.conf
# Lookup definitions backing the KV Store collections, so dashboards can use
# `| inputlookup phishnet_decisions`.
#

[phishnet_decisions]
external_type = kvstore
collection = phishnet_decisions
fields_list = _key, alert_id, verdict, confidence, reasoning, status, recommended_action, analyst_override, payload_executed, affected_host, recipient_count, sender, subject, users_clicked, creds_submitted, blast_timeline_json, blast_timeline_text, steps_text, endpoint_metrics_text, created, updated

[phishnet_audit_log]
external_type = kvstore
collection = phishnet_audit_log
fields_list = _key, ts, action, alert_id, analyst, detail

[phishnet_metrics]
external_type = kvstore
collection = phishnet_metrics
fields_list = _key, week_start, alerts_processed, threats_caught, minutes_saved, accuracy_pct, escalation_rate, updated

[phishnet_threat_intel]
external_type = kvstore
collection = phishnet_threat_intel
fields_list = _key, indicator, indicator_type, source, response, cached_at
